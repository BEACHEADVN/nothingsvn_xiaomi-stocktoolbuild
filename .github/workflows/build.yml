name: NothingsVN Xiaomi ROM Build Matrix

on:
  workflow_dispatch:

jobs:
  Build-ROM:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        region: [China, EEA] # Chạy song song 2 luồng độc lập
      fail-fast: false # Luồng này lỗi không làm luồng kia dừng theo
    name: Build ROM (${{ matrix.region }})
    
    steps:
      - name: Clean All Unused file,application
        run: |
          docker rmi `docker images -q` || true
          sudo rm -rf /usr/share/dotnet /etc/mysql /etc/apt/sources.list.d || true
          sudo apt -y purge azure-cli ghc* zulu* hhvm llvm* firefox google* dotnet* powershell || true
          sudo apt -y autoremove --purge || true
          sudo apt -y autoclean || true
          sudo apt clean || true

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          root-reserve-mb: 512
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Set up Time
        run: |
          echo "Setting Vietnam timezone"
          sudo timedatectl set-timezone Asia/Ho_Chi_Minh
          
      - name: Install OpenJDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Checkout repository
        uses: actions/checkout@main

      - name: Install Stuff
        run: |
          sudo bash setup.sh
          sudo apt-get update
          # Bỏ gói libc++abi1 gây lỗi, chỉ giữ lại libc++1 và các công cụ cần thiết
          sudo apt-get install -y p7zip-full jq curl python3-pip unzip libc++1 bsdmainutils
          pip3 install requests beautifulsoup4
          
          echo "⬇️ Đang tải Android Command Line Tools từ Google..."
          curl -sLo cmd-tools.zip "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          
          echo "📦 Đang cấu hình sdkmanager..."
          unzip -q cmd-tools.zip -d cmd-tools-dir
          mkdir -p android-sdk/cmdline-tools
          mv cmd-tools-dir/cmdline-tools android-sdk/cmdline-tools/latest
          
          echo "🤖 Đang tải Build-Tools 34.0.0 chính chủ từ Google Android SDK..."
          echo "y" | ./android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$(pwd)/android-sdk "build-tools;34.0.0" > /dev/null
          
          echo "✅ Đang đưa zipalign vào hệ thống..."
          sudo cp android-sdk/build-tools/34.0.0/zipalign /usr/bin/zipalign
          sudo chmod 777 /usr/bin/zipalign
          
          # TẠO SYMLINK LIÊN KẾT THƯ VIỆN TOÀN CỤC (ÉP ZIPALIGN PHẢI NHẬN)
          echo "🔗 Đang sửa liên kết thư viện libc++ toàn cục..."
          REAL_LIBCXX=$(find /usr/lib/ -name "libc++.so.1" | head -n 1)
          if [ -n "$REAL_LIBCXX" ]; then
            sudo ln -sf "$REAL_LIBCXX" /usr/lib/libc++.so
            sudo ln -sf "$REAL_LIBCXX" /lib/libc++.so
            sudo ln -sf "$REAL_LIBCXX" /usr/lib/x86_64-linux-gnu/libc++.so || true
            echo "✅ Đã phủ cấu trúc liên kết từ: $REAL_LIBCXX"
          else
            # Phương án dự phòng cứng nếu lệnh find không ra
            sudo ln -sf /usr/lib/x86_64-linux-gnu/libc++.so.1 /usr/lib/libc++.so
            sudo ln -sf /usr/lib/x86_64-linux-gnu/libc++.so.1 /lib/libc++.so
          fi
          
          # Cập nhật bộ nhớ đệm thư viện hệ thống
          sudo ldconfig
          
          # Dọn dẹp bộ cài tạm
          rm -rf cmd-tools.zip cmd-tools-dir android-sdk
          
          # Khai báo biến môi trường tạm thời cho luồng chạy hiện tại và kiểm tra
          export LD_LIBRARY_PATH=/usr/lib:/usr/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH
          if command -v zipalign &> /dev/null; then
            echo "✅ Zipalign từ Android SDK đã sẵn sàng hoạt động!"
            zipalign -v | head -n 1 || true
          else
            echo "❌ Lỗi: Không tìm thấy zipalign trong hệ thống!"
            exit 1
          fi
        
      - name: Giving permission
        run: |
          sudo chmod 777 -R *

      - name: Fetch Latest ROM URL
        id: fetch_rom
        run: |
          python3 - <<EOF
          import requests
          from bs4 import BeautifulSoup
          import os
          import re

          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          }
          
          target_region = "${{ matrix.region }}"
          base_url = "https://hyperosroms.com"
          model_url = f"{base_url}/model/myron"
          
          res = requests.get(model_url, headers=headers, timeout=15)
          if res.status_code != 200:
              print(f"❌ Không thể truy cập danh sách ROM vùng {target_region}")
              exit(1)
              
          soup = BeautifulSoup(res.text, 'html.parser')
          rows = soup.find_all('tr')
          sub_page_url = ""

          for row in rows:
              cells = row.find_all('td')
              if len(cells) >= 5:
                  region_text = cells[1].get_text(strip=True)
                  type_text = cells[2].get_text(strip=True).lower()
                  
                  # Nhận diện chính xác khu vực tương ứng của matrix luồng chạy
                  if region_text == target_region and type_text == "recovery":
                      link_tag = cells[0].find('a') or cells[-1].find('a')
                      if link_tag and 'href' in link_tag.attrs:
                          sub_page_url = base_url + link_tag['href'] if link_tag['href'].startswith('/') else link_tag['href']
                          break

          if not sub_page_url:
              print(f"❌ Không tìm thấy sub-page ROM phù hợp cho {target_region}")
              exit(1)

          res_sub = requests.get(sub_page_url, headers=headers, timeout=15)
          soup_sub = BeautifulSoup(res_sub.text, 'html.parser')
          
          package_name = ""
          for li in soup_sub.find_all(['li', 'p']):
              text = li.get_text()
              if "Package Name:" in text:
                  package_name = text.split("Package Name:")[-1].strip()
                  break
                  
          if not package_name:
              match = re.search(r'([\w-]+\.zip)', res_sub.text)
              if match:
                  package_name = match.group(1)

          if not package_name:
              print(f"❌ Không tìm thấy tên gói ZIP hợp lệ cho {target_region}")
              exit(1)

          version_code = sub_page_url.split('/')[-1]
          high_speed_url = f"https://bkt-sgp-miui-ota-update-alisgp.oss-ap-southeast-1.aliyuncs.com/{version_code}/{package_name}"
          
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"AUTO_INPUT_URL={high_speed_url}\n")
              f.write(f"ROM_FILE={package_name}\n")
          EOF

      - name: Build ROM...
        env:
          INPUT_URL: ${{ env.AUTO_INPUT_URL }}
        run: |
          sudo bash build.sh "$INPUT_URL"

      - name: Pack ROM...
        run: |
          sudo bash packROM.sh

      - name: Install 7zip & Jq
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full jq curl

      # ===== CHIA NHỎ FILE NẾU > 9GB =====
      - name: Split Large File
        id: split
        run: |
          FILE="${{ env.ROM_FILE }}"
          
          if [ -z "$FILE" ]; then
            echo "❌ Không tìm thấy tên file ROM hợp lệ từ bước Fetch!"
            exit 1
          fi

          echo "File ROM gốc dự kiến xử lý: $FILE"
          SIZE=$(sudo stat -c%s "$FILE")
          LIMIT=$((9 * 1024 * 1024 * 1024))
      
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "File > 9GB, đang chia nhỏ bằng 7z..."
            sudo 7z a -t7z -mx=0 -v9g "${FILE}.7z" "$FILE"
            echo "split=true" >> $GITHUB_OUTPUT
          else
            echo "File <= 9GB, giữ nguyên khối."
            echo "split=false" >> $GITHUB_OUTPUT
          fi

      # ===== UPLOAD PIXELDRAIN =====
      - name: Upload to Pixeldrain
        id: pd
        env:
          PD_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
        run: |
          FILE="${{ env.ROM_FILE }}"

          if [ "${{ steps.split.outputs.split }}" = "true" ]; then
            IDS=""
            LINKS=""
            COUNT=1

            for PART in *.7z.*; do
              echo "Uploading part: $PART"
              RESPONSE=$(curl -s -u ":$PD_API_KEY" \
                -F "file=@${PART}" \
                https://pixeldrain.com/api/file)

              ID=$(echo "$RESPONSE" | jq -r '.id')
              if [ "$ID" = "null" ] || [ -z "$ID" ]; then
                echo "❌ Upload failed for $PART"
                echo "$RESPONSE"
                exit 1
              fi

              if [ -z "$LINKS" ]; then
                IDS="$ID"
                LINKS="<a href=\"https://pixeldrain.com/u/$ID\">Part $COUNT</a>"
              else
                IDS="$IDS,$ID"
                LINKS="$LINKS | <a href=\"https://pixeldrain.com/u/$ID\">Part $COUNT</a>"
              fi
              COUNT=$((COUNT + 1))
            done
            echo "links=$LINKS" >> $GITHUB_OUTPUT
          else
            RESPONSE=$(curl -s -u ":$PD_API_KEY" \
              -F "file=@${FILE}" \
              https://pixeldrain.com/api/file)

            ID=$(echo "$RESPONSE" | jq -r '.id')
            if [ "$ID" = "null" ] || [ -z "$ID" ]; then
              echo "❌ Upload failed"
              echo "$RESPONSE"
              exit 1
            fi
            echo "links=<a href=\"https://pixeldrain.com/u/$ID\">Download</a>" >> $GITHUB_OUTPUT
          fi

      # ===== TELEGRAM NOTIFY =====
      - name: Update Database and Notification to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TG_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          FILE="${{ env.ROM_FILE }}"
          LINKS="${{ steps.pd.outputs.links }}"
          REGION="${{ matrix.region }}"

          TEXT="<b>🚀 New Xiaomi [${REGION}] ROM Built Successfully!</b>%0A%0A📦 <code>$FILE</code>%0A🔗 $LINKS"

          curl -s -X POST \
            "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="$TEXT" \
            -d parse_mode="HTML"
